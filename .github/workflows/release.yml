name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [win-x64, win-x86, linux-x64, linux-arm64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish App/UI24RBridge.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained \
            -o publish/${{ matrix.runtime }}

      - name: Zip artifact
        run: cd publish/${{ matrix.runtime }} && zip -r ../../UI24RBridge-${{ matrix.runtime }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UI24RBridge-${{ matrix.runtime }}
          path: UI24RBridge-${{ matrix.runtime }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '**/*.zip'
